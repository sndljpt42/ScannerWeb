<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Smart Attendance System
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <div class="container">

        <!-- ========================= -->
        <!-- HEADER -->
        <!-- ========================= -->

        <header>

            <h1>

                SMART ATTENDANCE SYSTEM

            </h1>

            <p>

                Scanner Absensi Panitia

            </p>

        </header>

        <!-- ========================= -->
        <!-- CAMERA -->
        <!-- ========================= -->

        <section
            class="camera">

            <div id="reader"></div>

            <div id="resultCard" class="result-card hidden">

                <div id="resultIcon" class="result-icon">
                    ✔
                </div>

                <div id="resultTitle" class="result-title">
                    ABSENSI BERHASIL
                </div>

                <div id="participantName" class="participant-name">

                </div>

                <div id="participantInfo" class="participant-info">

                </div>

            </div>

        </section>

        <!-- ========================= -->
        <!-- RESULT -->
        <!-- ========================= -->

        <section
            class="result">

            <h2>

                Status

            </h2>

            <div
                id="status"
                class="waiting">

                Menunggu Scan...

            </div>

            <table>

                <tr>

                    <td>Nama</td>

                    <td id="nama">-</td>

                </tr>

                <tr>

                    <td>Instansi</td>

                    <td id="instansi">-</td>

                </tr>

                <tr>

                    <td>Sesi</td>

                    <td id="sesi">-</td>

                </tr>

                <tr>

                    <td>Status</td>

                    <td id="hadir">-</td>

                </tr>

                <tr>

                    <td>Jam</td>

                    <td id="jam">-</td>

                </tr>

            </table>

        </section>

    </div>

<!-- Library QR Scanner -->
<script src="lib/html5-qrcode.min.js"></script>

<!-- Komunikasi dengan Google Apps Script -->
<script src="js/api.js"></script>


<!-- Main App -->

<script src="js/app.js"></script>

<!-- Scanner -->
<script src="js/scanner.js"></script>


</body>

</html>
